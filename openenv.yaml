name: driver-safety-env
version: "0.1.0"
description: "Driver Safety OpenEnv Environment"
tasks:
  - easy
  - medium  
  - hard
agent_interface:
  observation_space:
    type: "json"
    schema: "{'ear': 'float', 'drowsiness_state': 'str', 'ignore_count': 'int', 'sway_variance': 'float', 'eye_asymmetry': 'float', 'drunk_status': 'str'}"
  action_space:
    type: "string"
    choices: ["BEEP", "VOICE", "ALARM", "BLOCK_IGNITION", "NONE"]
